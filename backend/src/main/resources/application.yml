spring:
  application:
    name: jpa-portfolio
  datasource:
    url: jdbc:mysql://localhost:23306/jpa_portfolio?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true&useSSL=false
    username: jpa
    password: jpa_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        # statement_inspector: Phase 3 적용 완료 — HibernatePropertiesCustomizer로 등록
        # session_factory:
        #   statement_inspector: com.portfolio.jpa.common.metrics.SqlCaptureInspector

server:
  port: 18080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    hibernate:
      ddl-auto: create-drop
